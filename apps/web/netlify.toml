# In Netlify: set "Base directory" to apps/web (or use a site with repo root and adjust publish path).
[build]
  command = "cd ../.. && npm ci && npm run build --workspace @shieldride/web"
  publish = "dist"

# Proxy /api to ShieldRide API (browser stays same-origin). Must be before SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "https://shieldride-api.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
