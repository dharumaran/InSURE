# In Netlify: set "Base directory" to apps/admin.
[build]
  command = "cd ../.. && npm ci && npm run build --workspace @shieldride/admin"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://shieldride-api.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
