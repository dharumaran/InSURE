services:
  postgres:
    image: postgres:16-alpine
    container_name: shieldride-postgres
    environment:
      POSTGRES_USER: shieldride
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shieldride
    ports:
      - "5432:5432"
    volumes:
      - shieldride-postgres-data:/var/lib/postgresql/data
    networks:
      - shieldride-network

  redis:
    image: redis:7-alpine
    container_name: shieldride-redis
    ports:
      - "6379:6379"
    networks:
      - shieldride-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: shieldride-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - shieldride-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: shieldride-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - shieldride-network

  api:
    build:
      context: ./services/api
    container_name: shieldride-api
    env_file:
      - ./services/api/.env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - shieldride-network

  ml:
    build:
      context: ./services/ml
    container_name: shieldride-ml
    env_file:
      - ./services/ml/.env
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - shieldride-network

volumes:
  shieldride-postgres-data:

networks:
  shieldride-network:
    driver: bridge

